aws:
  profile: personal
  region: ap-northeast-1          # Tokyo (H100 Spot 가용)
  # SageMaker 실행 역할 ARN (setup_iam.sh로 생성 후 입력)
  role_arn: "arn:aws:iam::931016744724:role/SageMakerAutoresearchRole"

sagemaker:
  instance_type: ml.p5.4xlarge    # H100 80GB (Hopper) — 원본과 동일
  use_spot: true
  max_run: 900                    # 15분 (5분 학습 + 10분 오버헤드)
  max_wait: 3600                  # 1시간 spot 대기 (H100 경쟁 높음)
  framework_version: "2.8.0"      # SageMaker PyTorch DLC
  py_version: "py312"

s3:
  # SageMaker 기본 버킷 사용 시 비워두면 자동 설정
  bucket: ""
  data_prefix: autoresearch/data
  tokenizer_prefix: autoresearch/tokenizer
  output_prefix: autoresearch/output

pipeline:
  num_generations: 10            # 총 세대 수
  population_size: 10            # 세대당 후보 수
  # 후보 다양성 배분
  num_conservative: 3            # 하이퍼파라미터 미세 조정
  num_moderate: 4                # 아키텍처 변경
  num_aggressive: 2              # 급진적 변경
  num_crossover: 1               # Top-2 아이디어 결합

# H100 (80GB VRAM) 원본 모델 설정
model_defaults:
  depth: 8
  device_batch_size: 128
  total_batch_size: 524288       # 2^19
  window_pattern: "SSSL"
